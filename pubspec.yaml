name: flutter_application_1
description: "SSH Terminal & File Search — менеджер подключений с поиском по файлам"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dartssh2: ^2.8.0
  ffi: ^2.1.0
  file_picker: ^8.0.0+1
  path: ^1.9.0
  path_provider: ^2.1.2
  flutter_secure_storage: ^10.1.0
  logging: ^1.2.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  ffigen: ^11.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.5
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

ffigen:
  name: SearchEngineBindings
  description: 'FFI bindings for search_engine.dll'
  output: 'lib/native/search_engine_bindings.dart'
  headers:
    entry-points:
      - 'cpp/search_engine.h'
  compiler-opts:
    - '-D_WIN32'
  sort: true